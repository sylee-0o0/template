<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1 {
            color: white;
            background-color: orangered;
            padding:10px;
            border: 30px solid;
            border-color: black;
            margin: 60px;
        }
        .one {
            width: 600px;
            height: 600px;
            background-color: royalblue;
            position: relative;
            top: 50%;
            z-index: 700;
        }
        .two {
            width: 200px;
            height: 200px;
            position: absolute;
            top: 50%;
            background-color: brown;
            z-index: 200;
        }
        .three {
            width: 200px;
            height: 200px;
            background-color: green;
            position: absolute;
            top: 50%;
            z-index: 300;
        }
        .four {
            width: 200px;
            height: 200px;
            background-color: linen;
            position: absolute;
            top: 50%;
            z-index: 500;
        }
    </style>
</head>
<body>
    <h1>Hell's Kitchen<br>헬스 키친</h1>

    <br><br><br>

    <div class="one">
        <div class="two"></div>
        <div class="three"></div>
        <div class="four"></div>
    </div>

</body>
</html>
