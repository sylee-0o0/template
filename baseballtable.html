<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스포츠 KBO리그 순위</title>
    <style>
        table { border-collapse: collapse; width: 100%; text-align: center; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; }
        th { color: #888; font-weight: normal; }
        td.team-name { text-align: left; }
        td.team-name img { width: 24px; vertical-align: middle; margin-right: 6px; }  /* 칸을 보이게 하기 위한 테두리*/
    </style>
</head>
<body>
    <h2>종합 순위</h2>
    <table>
        <thead>
            <tr>
                <th>순위</th>
                <th>팀</th>
                <th>경기</th>
                <th>승</th>
                <th>무</th>
                <th>패</th>
                <th>승률</th>
                <th>게임차</th>
                <th>연속</th>
            </tr>
        </thead>
    <tbody id="rankBody">
    <!-- JS가 여기에 행을 채웁니다 -->
    </tbody>
</table>
    <h4 style="color: #888;">1,2위 최종 순위는 한국시리즈 결과를 반영합니다.</h4>

    <script>
        const jsonUrl = "https://prof-jwchi.github.io/kopo-front2026/Json/baseball.json";

        // fetch API 로 JSON 파일 가져오기
        fetch(jsonUrl)
        .then((response) => {
            // 응답을 JSON 으로 변환
            return response.json();
        })
        .then((data) => {
            const tbody = document.getElementById("rankBody");
            let html = "";

            data.list.forEach((team) => {
                const r = team.rank; // rank 객체를 변수로 뽑아두면 코드가 짧아짐
                html += `
                <tr>
                <td>${r.rank}</td>
                <td class="team-name">
                    <img src="${team.imageUrl}" alt="${team.shortNameKo}" />
                    ${team.shortNameKo}
                </td>
                <td>${r.game}</td>
                <td>${r.win}</td>
                <td>${r.draw}</td>
                <td>${r.loss}</td>
                <td>${r.wpct}</td>
                <td>${r.gb}</td>
                <td>${r.streak}</td>
                </tr>
                `;
            });

            tbody.innerHTML = html;
            })
        .catch((error) => {
            // 오류 처리
            console.error("JSON 파일을 가져오는 데 실패했습니다.", error);
        });
        </script>
</body>
</html>
