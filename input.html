<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>입력 태그 실습</title>
</head>
<body>
    <h2>회원가입</h2>
    <form action="" methode="post">
        <label for="userid">아이디 : </label>
        <input type="text" id="userid" name="userid" placeholder="아이디"><br><br>

        <label for="userpw">비밀번호 : </label>
        <input type="text" id="userpw" name="userpw" placeholder="비밀번호"><br><br>

        <p>성별 선택 :</p>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">남성</label>
        <input type="radio" id="female" name="gendeyo" value="female">
        <label for="female">여성</label><br><br>

        <p>관심 분야 (복수 선택 가능) :</p>
        <input type="checkbox" id="fe" name="interest" value="frontend">
        <label for="fe">프론트엔드</label>
        <input type="checkbox" id="be" name="interest" value="backend">
        <label for="be">백엔드</label><br><br>

        <input type="submit" value="가입하기">
        <input type="reset" value="다시 쓰기">
    </form>
</body>
</html>
