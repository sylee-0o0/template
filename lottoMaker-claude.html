<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로또 생성기</title>
<style>
    body {
        font-family: sans-serif;
        text-align: center;
        margin-top: 50px;
    }

    #result, #bonusResult {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-top: 20px;
        min-height: 60px;
    }

    /* 공 모양 기본 스타일 */
    .ball {
        width: 50px;
        height: 50px;
        border-radius: 50%; /* 정사각형을 완전한 원으로 */
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bold;
        font-size: 18px;
        box-shadow: 1px 2px 4px rgba(0,0,0,0.3);

        /* 애니메이션을 위한 초기 상태: 안 보이고 작게 시작 */
        opacity: 0;
        transform: scale(0);
        animation: popIn 0.4s ease forwards;
    }

    @keyframes popIn {
        to {
            opacity: 1;
            transform: scale(1);
        }
    }

    /* 번호 구간별 색상 (실제 로또 색상 참고) */
    .range1 { background-color: #fbc400; } /* 1~10 노랑 */
    .range2 { background-color: #69c8f2; } /* 11~20 파랑 */
    .range3 { background-color: #ff7272; } /* 21~30 빨강 */
    .range4 { background-color: #aaaaaa; } /* 31~40 회색 */
    .range5 { background-color: #b0d840; } /* 41~45 초록 */

    #bonus {
        display: none; /* 처음엔 숨겨두고, 번호 뽑히면 보이게 */
        margin-top: 15px;
    }
</style>
</head>
<body>
    <h1>로또 번호 추첨기</h1>
    <button id="btn1">로또 번호 생성하기</button>
    <div id="result"></div>

    <button id="bonus">보너스 번호 뽑기</button>
    <div id="bonusResult"></div>

    <script>
        const btn1 = document.getElementById("btn1");
        const bonusBtn = document.getElementById("bonus");
        const result = document.getElementById("result");
        const bonusResult = document.getElementById("bonusResult");

        // btn1과 bonus 양쪽에서 공유해야 하니까 바깥 스코프로 뺐어요.
        let numbers = [];

        // 숫자 구간에 맞는 클래스명을 돌려주는 함수 (색상 판단용)
        function getRangeClass(num) {
            if (num <= 10) return "range1";
            if (num <= 20) return "range2";
            if (num <= 30) return "range3";
            if (num <= 40) return "range4";
            return "range5";
        }

        // 공 하나(span)를 만들어서 컨테이너에 붙여주는 함수
        // delay를 줘서 순서대로 하나씩 나타나는 애니메이션 효과
        function createBall(num, container, index) {
            const ball = document.createElement("span");
            ball.className = "ball " + getRangeClass(num);
            ball.textContent = num;
            ball.style.animationDelay = (index * 0.15) + "s"; // 0.15초씩 순차 등장
            container.appendChild(ball);
        }

        btn1.addEventListener("click", () => {
            numbers = []; // 다시 누르면 초기화
            for (let i = 0; i < 6; i++) {
                const num = Math.floor(Math.random() * 45) + 1;
                if (numbers.includes(num)) {
                    i--;
                } else {
                    numbers.push(num);
                }
            }
            numbers.sort((a, b) => a - b);
            console.log(`추첨 번호 : ${numbers}`);

            result.innerHTML = ""; // 이전 결과 지우기
            numbers.forEach((num, index) => {
                createBall(num, result, index);
            });

            // 보너스 결과도 초기화하고, 버튼을 보이게
            bonusResult.innerHTML = "";
            bonusBtn.style.display = "inline-block";
        });

        bonusBtn.addEventListener("click", () => {
            let bonusNum;
            // do-while
            do {
                bonusNum = Math.floor(Math.random() * 45) + 1;
            } while (numbers.includes(bonusNum));

            console.log(`보너스 번호 : ${bonusNum}`);
            bonusResult.innerHTML = ""; // 누를 때마다 새 보너스 번호로 교체
            createBall(bonusNum, bonusResult, 0);
        });
    </script>
</body>
</html>
