<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ㅇㅅㅇ 실습 페이지</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: rgb(251, 250, 247);
    --ink:#26313D;
    --ink-soft:#66707c;
    --mono:'Space Mono','IBM Plex Mono',monospace;
    --sans:'Noto Sans KR','Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      repeating-linear-gradient(180deg, rgba(0,0,0,0.015) 0px, rgba(0,0,0,0.015) 1px, transparent 1px, transparent 34px),
      var(--paper);
    color:var(--ink);
    font-family:var(--sans);
    min-height:100vh;
    padding:clamp(20px, 5vw, 64px) clamp(16px, 6vw, 96px) 120px;
  }
  .page{ max-width:760px; margin:0 auto; }

  /* ---------- HERO ---------- */
  .hero{ margin-bottom:36px; position:relative; }
  h1{
    font-family:var(--mono);
    font-weight:700;
    font-size:clamp(28px, 6vw, 44px);
    margin:0;
    letter-spacing:0.01em;
    min-height:1.3em;
    display:flex;
    align-items:baseline;
  }
  #titleText{ white-space:pre; }
  .cursor{
    display:inline-block;
    margin-left:2px;
    animation:blink 1s step-end infinite;
  }
  @keyframes blink{ 0%,49%{opacity:1;} 50%,100%{opacity:0;} }
  .tagline{
    margin:10px 0 0;
    color:var(--ink-soft);
    font-size:14.5px;
  }

  /* ---------- BREADCRUMB ---------- */
  .breadcrumb{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    gap:6px;
    font-family:var(--mono);
    font-size:12.5px;
    color:var(--ink-soft);
    margin-bottom:18px;
    min-height:20px;
  }
  .breadcrumb button{
    background:none;border:none;cursor:pointer;
    font-family:var(--mono);
    font-size:12.5px;
    color:var(--ink-soft);
    padding:2px 4px;
    border-radius:4px;
  }
  .breadcrumb button:hover{ color:var(--ink); text-decoration:underline; }
  .breadcrumb button:focus-visible{ outline:2px solid var(--stamp); outline-offset:2px; }
  .breadcrumb .current{ color:var(--ink); font-weight:700; }
  .breadcrumb .sep{ opacity:0.5; }

  /* ---------- OPEN FOLDER HEADER CARD ---------- */
  .folder-header{
    display:flex;
    align-items:center;
    gap:16px;
    background:var(--card);
    border:1px solid var(--rule);
    border-radius:var(--radius);
    padding:18px 20px;
    margin-bottom:22px;
    box-shadow:0 2px 0 var(--rule);
  }
  .folder-header .icon-folder-open{ width:56px; height:42px; flex-shrink:0; }
  .folder-header h2{
    margin:0;
    font-size:19px;
    font-weight:700;
  }
  .folder-header .meta{
    margin:2px 0 0;
    font-size:12.5px;
    color:var(--ink-soft);
    font-family:var(--mono);
  }

  /* ---------- LISTING ---------- */
  .listing{
    background:var(--card);
    border:1px solid var(--rule);
    border-radius:var(--radius);
    overflow:hidden;
    box-shadow:0 2px 0 var(--rule);
  }
  .row{
    display:flex;
    align-items:center;
    gap:14px;
    width:100%;
    text-align:left;
    background:none;
    border:none;
    border-bottom:1px solid var(--paper-line);
    padding:14px 18px;
    cursor:pointer;
    font-family:var(--sans);
    color:var(--ink);
    transition:background 0.15s ease, padding-left 0.15s ease;
  }
  .row:last-child{ border-bottom:none; }
  .row:hover{ background:rgba(217,164,65,0.12); padding-left:22px; }
  .row:focus-visible{ outline:2px solid var(--stamp); outline-offset:-2px; }
  .row .icon-folder-closed, .row .icon-file{ width:28px; height:24px; flex-shrink:0; }
  .row .label{ display:flex; flex-direction:column; gap:2px; flex:1; min-width:0; }
  .row .name{ font-weight:500; font-size:15px; }
  .row .sub{ font-size:11.5px; color:var(--ink-soft); font-family:var(--mono); }
  .row .arrow{ color:var(--ink-soft); font-family:var(--mono); font-size:13px; }
  .empty{ padding:28px 18px; color:var(--ink-soft); font-size:14px; font-family:var(--mono); }

  /* ---------- FILE VIEW ---------- */
  .file-view{
    background:var(--card);
    border:1px solid var(--rule);
    border-radius:var(--radius);
    padding:26px 26px 30px;
    box-shadow:0 2px 0 var(--rule);
    background-image: repeating-linear-gradient(180deg, transparent 0, transparent 27px, var(--paper-line) 28px);
  }
  .file-view h2{ margin:0 0 14px; font-size:18px; display:flex; align-items:center; gap:10px; }
  .file-view h2 .icon-file{ width:24px; height:28px; }
  .file-view pre{
    margin:0;
    font-family:var(--mono);
    font-size:13.5px;
    line-height:28px;
    white-space:pre-wrap;
    color:var(--ink);
  }
  .back-btn{
    margin-top:20px;
    background:none;
    border:1.5px solid var(--ink-soft);
    color:var(--ink);
    font-family:var(--mono);
    font-size:12.5px;
    padding:7px 14px;
    border-radius:6px;
    cursor:pointer;
  }
  .back-btn:hover{ background:var(--ink); color:var(--card); border-color:var(--ink); }
  .back-btn:focus-visible{ outline:2px solid var(--stamp); outline-offset:2px; }

  svg{ display:block; }
  .icon-folder-closed path{ fill:var(--tab); stroke:var(--tab-deep); stroke-width:1.2; }
  .icon-folder-open .back{ fill:var(--tab-dark); stroke:var(--tab-deep); stroke-width:1.2; }
  .icon-folder-open .front{ fill:var(--tab); stroke:var(--tab-deep); stroke-width:1.2; }
  .icon-file path.body{ fill:var(--card); stroke:var(--ink-soft); stroke-width:1.4; }
  .icon-file path.fold{ fill:none; stroke:var(--ink-soft); stroke-width:1.2; }

  @media (prefers-reduced-motion: reduce){
    .cursor{ animation:none; opacity:1; }
  }
</style>
</head>
<body>

<div class="page">
  <header class="hero">
    <h1 aria-label="ㅇㅅㅇ 실습 페이지"><span id="titleText" aria-hidden="true"></span><span class="cursor" aria-hidden="true">|</span></h1>
    <p class="tagline">폴더를 눌러보세요.</p>
  </header>

  <nav class="breadcrumb" id="breadcrumb" aria-label="현재 위치"></nav>
  <section class="folder-header" id="folderHeader" hidden></section>
  <section class="listing" id="listing"></section>
  <section class="file-view" id="fileView" hidden></section>
</div>

<script>
/* ============ 데이터 구조 ============
   type: 'folder' | 'file'
   folder: { name, type:'folder', children:[...] }
   file:   { name, type:'file', content:'...' }
   필요한 만큼 children을 계속 추가하면 몇 단계든 깊게 중첩 가능합니다.
=========================================== */
const root = {
  name:'홈', type:'folder', children:[
    { name:'Templete', type:'folder', children:[
      { name:'260720', type:'folder', children:[
        { name:'실습노트.md', type:'file', content:'# 260720 실습 기록\n\n오늘 다룬 내용을 이곳에 정리합니다.\n\n- 학습 주제 :\n- 배운 점   :\n- 다음에 해볼 것 :' },
        { name:'참고링크.txt', type:'file', content:'참고한 자료나 링크를 이곳에 모아두세요.\n\n1.\n2.' }
      ]},
      { name:'260721', type:'folder', children:[
        { name:'실습노트.md', type:'file', content:'# 260721 실습 기록\n\n오늘 다룬 내용을 이곳에 정리합니다.\n\n- 학습 주제 :\n- 배운 점   :\n- 다음에 해볼 것 :' }
      ]},
      { name:'260722', type:'folder', children:[
        { name:'실습노트.md', type:'file', content:'# 260722 실습 기록\n\n오늘 다룬 내용을 이곳에 정리합니다.\n\n- 학습 주제 :\n- 배운 점   :\n- 다음에 해볼 것 :' },
        { name:'복습', type:'folder', children:[
          { name:'복습노트.md', type:'file', content:'# 260722 복습\n\n헷갈렸던 부분이나 다시 볼 내용을 정리합니다.' }
        ]}
      ]},
      { name:'260723', type:'folder', children:[
        { name:'실습노트.md', type:'file', content:'# 260723 실습 기록\n\n오늘 다룬 내용을 이곳에 정리합니다.' }
      ]},
      { name:'260724', type:'folder', children:[
        { name:'실습노트.md', type:'file', content:'# 260724 실습 기록\n\n오늘 다룬 내용을 이곳에 정리합니다.' }
      ]}
    ]}
  ]
};

/* ============ 아이콘 ============ */
/*const iconFolderClosed = `
<svg class="icon-folder-closed" viewBox="0 0 48 36" xmlns="http://www.w3.org/2000/svg">
  <path d="M2 8c0-2.2 1.8-4 4-4h10l4 4h20c2.2 0 4 1.8 4 4v18c0 2.2-1.8 4-4 4H6c-2.2 0-4-1.8-4-4V8z"/>
</svg>`;*/
const iconFolderClosed = `
<h1 class="icon-folder-closed">📁</h1>`;
const iconFolderOpen = `
<svg class="icon-folder-open" viewBox="0 0 64 48" xmlns="http://www.w3.org/2000/svg">
  <path class="back" d="M4 10c0-2.2 1.8-4 4-4h14l4 5h30c2.2 0 4 1.8 4 4v25c0 2.2-1.8 4-4 4H8c-2.2 0-4-1.8-4-4V10z"/>
  <path class="front" d="M2 20l6-8h48l6 8-8 20H8L2 20z"/>
</svg>`;
const iconFile = `
<svg class="icon-file" viewBox="0 0 36 44" xmlns="http://www.w3.org/2000/svg">
  <path class="body" d="M4 2h18l10 10v30H4V2z"/>
  <path class="fold" d="M22 2v10h10"/>
</svg>`;

/* ============ 상태 ============ */
let path = [];          // root부터 현재 폴더까지의 노드 배열 (root 제외)
let viewingFile = null; // 현재 열람 중인 파일 노드

function currentFolder(){ return path.length ? path[path.length-1] : root; }

/* ============ 렌더링 ============ */
const breadcrumbEl = document.getElementById('breadcrumb');
const folderHeaderEl = document.getElementById('folderHeader');
const listingEl = document.getElementById('listing');
const fileViewEl = document.getElementById('fileView');

function renderBreadcrumb(){
  breadcrumbEl.innerHTML = '';
  const crumbs = [{name:'홈'}, ...path, ...(viewingFile ? [viewingFile] : [])];
  crumbs.forEach((node, i) => {
    if(i > 0){
      const sep = document.createElement('span');
      sep.className = 'sep';
      sep.textContent = '/';
      breadcrumbEl.appendChild(sep);
    }
    const isLast = i === crumbs.length - 1;
    if(isLast){
      const span = document.createElement('span');
      span.className = 'current';
      span.textContent = node.name;
      breadcrumbEl.appendChild(span);
    } else {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.textContent = node.name;
      btn.addEventListener('click', () => {
        viewingFile = null;
        path = path.slice(0, i); // i=0 -> 홈, i=1 -> path[0]까지 ...
        render();
      });
      breadcrumbEl.appendChild(btn);
    }
  });
}

function renderFolderHeader(){
  if(path.length === 0){
    folderHeaderEl.hidden = true;
    folderHeaderEl.innerHTML = '';
    return;
  }
  const node = currentFolder();
  const count = node.children.length;
  folderHeaderEl.hidden = false;
  folderHeaderEl.innerHTML = `
    ${iconFolderOpen}
    <div>
      <h2>${node.name}</h2>
      <p class="meta">${count}개 항목</p>
    </div>
  `;
}

function renderListing(){
  listingEl.hidden = false;
  const node = viewingFile ? null : currentFolder();
  if(!node) return;
  listingEl.innerHTML = '';
  if(node.children.length === 0){
    listingEl.innerHTML = `<div class="empty">비어 있습니다.</div>`;
    return;
  }
  node.children.forEach(child => {
    const row = document.createElement('button');
    row.type = 'button';
    row.className = 'row';
    const icon = child.type === 'folder' ? iconFolderClosed : iconFile;
    const sub = child.type === 'folder'
      ? `${child.children.length}개 항목`
      : '문서';
    const arrow = child.type === 'folder' ? '&rsaquo;' : '&#9679;';
    row.innerHTML = `
      ${icon}
      <span class="label">
        <span class="name">${child.name}</span>
        <span class="sub">${sub}</span>
      </span>
      <span class="arrow">${arrow}</span>
    `;
    row.addEventListener('click', () => {
      if(child.type === 'folder'){
        viewingFile = null;
        path = [...path, child];
      } else {
        viewingFile = child;
      }
      render();
    });
    listingEl.appendChild(row);
  });
}

function renderFileView(){
  if(!viewingFile){
    fileViewEl.hidden = true;
    fileViewEl.innerHTML = '';
    return;
  }
  fileViewEl.hidden = false;
  fileViewEl.innerHTML = `
    <h2>${iconFile} ${viewingFile.name}</h2>
    <pre>${viewingFile.content}</pre>
    <button type="button" class="back-btn" id="backBtn">&larr; 목록으로</button>
  `;
  document.getElementById('backBtn').addEventListener('click', () => {
    viewingFile = null;
    render();
  });
}

function render(){
  renderBreadcrumb();
  renderFolderHeader();
  if(viewingFile){
    listingEl.hidden = true;
    renderFileView();
  } else {
    fileViewEl.hidden = true;
    fileViewEl.innerHTML = '';
    renderListing();
  }
}

render();

/* ============ 타이틀 스크램블 애니메이션 ============ */
const target = 'ㅇㅅㅇ 실습 페이지';
const glyphPool = 'ㄱㄴㄷㄹㅁㅂㅅㅇㅈㅊㅋㅌㅍㅎㅏㅑㅓㅕㅗㅛㅜㅠㅡㅣ#$%&*+=~^01234567890'.split('');
const titleTextEl = document.getElementById('titleText');
const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }
function randChar(){ return glyphPool[Math.floor(Math.random() * glyphPool.length)]; }
function randomString(len){ return Array.from({length: len}, randChar).join(''); }

async function typeString(str, speed){
  titleTextEl.textContent = '';
  for(let i = 0; i < str.length; i++){
    titleTextEl.textContent += str[i];
    await sleep(speed);
  }
}
async function eraseString(speed){
  while(titleTextEl.textContent.length > 0){
    titleTextEl.textContent = titleTextEl.textContent.slice(0, -1);
    await sleep(speed);
  }
}
async function resolveTarget(str, speed, flickers){
  let current = '';
  for(let i = 0; i < str.length; i++){
    if(str[i] === ' '){
      current += ' ';
      titleTextEl.textContent = current;
      await sleep(speed);
      continue;
    }
    for(let f = 0; f < flickers; f++){
      titleTextEl.textContent = current + randChar();
      await sleep(speed * 0.55);
    }
    current += str[i];
    titleTextEl.textContent = current;
    await sleep(speed);
  }
}

async function playCycle(){
  if(prefersReducedMotion){
    titleTextEl.textContent = target;
    return;
  }
  await typeString(randomString(7 + Math.floor(Math.random()*4)), 42);
  await sleep(320);
  await eraseString(24);
  await sleep(140);
  await typeString(randomString(6 + Math.floor(Math.random()*4)), 42);
  await sleep(320);
  await eraseString(24);
  await sleep(160);
  await resolveTarget(target, 58, 5);
  setTimeout(playCycle, 30000); // 완성 후 30초 대기, 반복
}
playCycle();
</script>
</body>
</html>
